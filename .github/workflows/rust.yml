name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache cargo dependencies
      uses: Swatinem/rust-cache@v2

    - name: Check formatting
      run: cargo fmt -- --check

    - name: Run clippy
      run: cargo clippy --all-targets -- -D warnings

    - name: Build
      run: cargo build --lib --bins

    - name: Run tests per module
      run: |
        echo "=== Running tests per module to avoid cross-module hang ==="
        for module in $(cargo test --lib -- --list 2>&1 | grep ": test" | cut -d: -f1 | sort -u); do
          echo "=== Testing module: $module ==="
          cargo test --lib $module -- --test-threads=1 --nocapture
        done

    - name: Build release
      run: cargo build --release --lib --bins
