name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Ensure components installed
      run: rustup component add rustfmt clippy

    - name: Cache cargo dependencies
      uses: Swatinem/rust-cache@v2

    - name: Check formatting
      run: cargo fmt -- --check

    - name: Run clippy
      run: cargo clippy --all-targets -- -W clippy::all

    - name: Build
      run: cargo build --lib --bins

    - name: Run tests per module
      run: |
        modules="airgap audit bench benchmark endurance energy energy_telemetry euler hal identity kernel_enforcement memory mpfr_oracle mpfr_zeta network_calculus pim_solver ramanujan reference_data set10_fusion set9_telemetry thermodynamic_balance truncation_budget zeta_resonance"
        for module in $modules; do
          echo "=== Testing module: $module ==="
          cargo test --lib $module -- --test-threads=1 --nocapture
        done

    - name: Build release
      run: cargo build --release --lib --bins
